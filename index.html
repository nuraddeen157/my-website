<!DOCTYPE html>
<html>
<body style="text-align:center;background:black;color:white">

<h1>My Website 😎</h1>

<input id="user" placeholder="Username"><br><br>
<input id="pass" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
function login(){
var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){
document.getElementById("msg").innerHTML="Login success 😎";
}else{
document.getElementById("msg").innerHTML="Wrong details ❌";
}
}
</script>

</body>
</html>
